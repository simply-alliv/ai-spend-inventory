name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only by default; the deploy job reads the encrypted service-account secret.
permissions:
  contents: read

# Never run overlapping deploys for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub-hosted runners can hit IPv6 "premature close" resets against Google
  # APIs; prefer IPv4 to reduce flaky firebase-tools retries.
  NODE_OPTIONS: --dns-result-order=ipv4first

jobs:
  checks:
    name: Checks · lint, type-check, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy · Firebase Hosting (live)
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy to live channel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Authenticate with the service account via Application Default Credentials.
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"

          set +e
          OUTPUT=$(firebase deploy --only hosting --project ai-spend-inventory --non-interactive 2>&1)
          CODE=$?
          set -e

          echo "$OUTPUT"
          rm -f "$RUNNER_TEMP/sa.json"

          if [ "$CODE" -eq 0 ]; then
            echo "Deploy succeeded."
            exit 0
          fi

          # A flaky "premature close" on the runner can make firebase-tools retry
          # the (non-idempotent) release call after it already succeeded, returning
          # FAILED_PRECONDITION "is the current active version". That means the new
          # version DID go live, so treat it as success — but fail on anything else.
          if printf '%s' "$OUTPUT" | grep -q "is the current active version"; then
            echo "::notice::Release is already the active version (retry race) — deploy succeeded."
            exit 0
          fi

          echo "::error::Firebase deploy failed."
          exit "$CODE"
