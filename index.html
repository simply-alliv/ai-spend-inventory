<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AI Spend Inventory — one owner-mapped table that ties AI/tooling spend to workflows and owners across surfaces, so a surge can be attributed and contained. Illustrative demo."
    />
    <meta name="color-scheme" content="light dark" />
    <title>AI Spend Inventory — AI Operations dashboard</title>
    <script>
      // Apply saved/system theme before paint to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem("ai-spend-theme");
          if (
            t === "dark" ||
            (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
